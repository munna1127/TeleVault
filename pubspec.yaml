name: televault
description: "TeleVault - Backup your photos and videos to a private Telegram chat."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  photo_manager: ^3.6.4
  photo_manager_image_provider: ^2.2.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  dio: ^5.7.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
